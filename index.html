<style>
  :root{
    --orange:#F9A826; --turq:#27C4B2; --lime:#9CD93C; --coral:#FF6B6B;
    --lav:#8E6BE8; --char:#2E2E2E; --cream:#FFF8EE; --white:#FFFFFF;
    --ink-soft:#6B6357; --line:#F0E5D3; --duitnow:#E6007E;
    --r:20px; --ease:cubic-bezier(.34,1.4,.4,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--char);line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1060px;margin:0 auto;padding:0 18px}
  :is(a,button,input,select,textarea):focus-visible{outline:3px solid var(--turq);outline-offset:2px;border-radius:8px}

  header{position:sticky;top:0;z-index:40;background:rgba(255,248,238,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{display:flex;align-items:center;gap:9px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:17.5px;white-space:nowrap}
  .logo .o{width:26px;height:26px}
  .nav-right{display:flex;align-items:center;gap:10px}
  .icon-btn{position:relative;width:42px;height:42px;border-radius:50%;background:var(--white);border:2px solid var(--line);display:grid;place-items:center;transition:transform .25s var(--ease)}
  .icon-btn:hover{transform:translateY(-2px)}
  .cart-count{position:absolute;top:-4px;right:-4px;min-width:19px;height:19px;border-radius:100px;background:var(--coral);color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center;padding:0 5px;transform:scale(0);transition:transform .3s var(--ease)}
  .cart-count.show{transform:scale(1)}

  .hero{position:relative;text-align:center;padding:42px 18px 28px;overflow:hidden}
  .hero h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(34px,7.5vw,56px);line-height:1.05;margin:16px auto 10px;max-width:14ch}
  .hero h1 .hl{color:var(--coral)}
  .hero p{color:var(--ink-soft);font-size:16.5px;max-width:38ch;margin:0 auto}
  .zzz{position:absolute;font-family:'Fredoka',sans-serif;font-weight:700;color:var(--turq);opacity:0;animation:float 4s ease-in-out infinite;pointer-events:none}
  .z1{font-size:26px;top:34%;left:12%}.z2{font-size:20px;top:26%;left:16%;animation-delay:1.3s}
  .z3{font-size:26px;top:32%;right:13%;animation-delay:.6s;color:var(--coral)}
  .z4{font-size:19px;top:23%;right:17%;animation-delay:1.9s;color:var(--coral)}
  @keyframes float{0%{opacity:0;transform:translateY(8px) rotate(-6deg)}25%{opacity:.9}60%{opacity:.6}100%{opacity:0;transform:translateY(-26px) rotate(8deg)}}

  .controls{position:sticky;top:60px;z-index:30;background:linear-gradient(var(--cream) 75%,transparent);padding:10px 0 14px}
  .search{display:flex;align-items:center;gap:10px;background:var(--white);border:2px solid var(--line);border-radius:100px;padding:11px 18px;box-shadow:0 6px 18px -10px rgba(46,46,46,.15);transition:border-color .2s}
  .search:focus-within{border-color:var(--turq)}
  .search input{flex:1;border:none;outline:none;font:inherit;font-size:15.5px;background:transparent}
  .search input::placeholder{color:#B9AE9C}
  .chips{display:flex;gap:8px;margin-top:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;font-family:'Fredoka',sans-serif;font-weight:600;font-size:13.5px;padding:8px 16px;border-radius:100px;background:var(--white);border:2px solid var(--line);color:var(--ink-soft);transition:all .2s var(--ease)}
  .chip:hover{transform:translateY(-2px)}
  .chip.on{background:var(--char);border-color:var(--char);color:#fff}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:6px 0 60px}
  @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr);gap:18px}}
  @media(min-width:920px){.grid{grid-template-columns:repeat(4,1fr)}}
  .card{background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:0 4px 14px -8px rgba(46,46,46,.12);transition:transform .3s var(--ease),box-shadow .3s var(--ease);display:flex;flex-direction:column}
  .card:hover{transform:translateY(-5px) rotate(-.5deg);box-shadow:0 18px 30px -14px rgba(46,46,46,.22)}
  .tile{position:relative;aspect-ratio:1;display:grid;place-items:center;overflow:hidden;cursor:pointer}
  .tile img{width:100%;height:100%;object-fit:cover}
  .tile .ph{font-size:64px;filter:drop-shadow(0 8px 8px rgba(46,46,46,.15))}
  .badge{position:absolute;top:10px;left:10px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:11px;padding:4px 10px;border-radius:100px}
  .badge.preorder{background:var(--orange)}
  .badge.soon{background:var(--lav);color:#fff}
  .cinfo{padding:12px 14px 14px;display:flex;flex-direction:column;gap:2px;flex:1}
  .cser{font-family:'Fredoka',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#B9AE9C}
  .cname{font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;cursor:pointer}
  .crow{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .cprice{font-weight:800;font-size:15px;color:var(--coral)}
  .add-btn{width:34px;height:34px;border-radius:50%;background:var(--char);color:#fff;font-size:18px;font-weight:700;display:grid;place-items:center;transition:transform .25s var(--ease),background .2s;line-height:1}
  .add-btn:hover{transform:scale(1.12) rotate(90deg);background:var(--turq)}
  .add-btn.off{background:var(--line);color:#B9AE9C;pointer-events:none}
  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--ink-soft)}
  .empty .big{font-size:44px}
  .empty p{font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;margin-top:8px;color:var(--char)}

  /* SHEETS */
  .overlay{position:fixed;inset:0;background:rgba(46,46,46,.45);z-index:60;display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .sheet{background:var(--cream);width:100%;max-width:480px;border-radius:26px 26px 0 0;padding:16px 20px 24px;max-height:90vh;overflow-y:auto;animation:up .35s var(--ease)}
  @media(min-width:640px){.overlay{align-items:center;padding:20px}.sheet{border-radius:26px}}
  @keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
  .grab{width:44px;height:5px;border-radius:100px;background:var(--line);margin:0 auto 12px}
  .sheet-inner{position:relative}
  .close{position:absolute;top:0;right:0;width:34px;height:34px;border-radius:50%;background:var(--white);display:grid;place-items:center;font-size:15px;box-shadow:0 4px 10px rgba(46,46,46,.12);z-index:2}
  .sheet h2{font-family:'Fredoka',sans-serif;font-weight:700;font-size:21px;margin-bottom:4px;padding-right:40px}

  .stile{position:relative;border-radius:var(--r);aspect-ratio:1.6;display:grid;place-items:center;overflow:hidden}
  .stile img{width:100%;height:100%;object-fit:cover}
  .stile .ph{font-size:84px;filter:drop-shadow(0 10px 10px rgba(46,46,46,.18))}
  .sname{font-family:'Fredoka',sans-serif;font-weight:700;font-size:23px;margin-top:12px}
  .sser{font-family:'Fredoka',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#B9AE9C}
  .sprice{font-weight:800;font-size:19px;color:var(--coral);margin:4px 0 8px}
  .sdesc{color:var(--ink-soft);font-size:15px}
  .cta-row{display:flex;gap:10px;margin-top:16px}
  .cta{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:15.5px;padding:14px;border-radius:100px;transition:transform .25s var(--ease)}
  .cta:hover{transform:translateY(-2px)}
  .cta.dark{background:var(--char);color:#fff}
  .cta.accent{background:var(--coral);color:#fff;box-shadow:0 8px 18px -8px rgba(255,107,107,.55)}
  .cta.dnpay{background:var(--duitnow);color:#fff;box-shadow:0 8px 18px -8px rgba(230,0,126,.5)}
  .cta.ghost{background:var(--white);border:2px solid var(--line)}
  .cta.off{background:var(--line);color:#B9AE9C;pointer-events:none}
  .cta.full{flex:none;width:100%}

  /* CART */
  .cart-line{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:16px;padding:10px;margin-top:10px}
  .cart-thumb{width:56px;height:56px;border-radius:12px;display:grid;place-items:center;font-size:28px;flex:none;overflow:hidden}
  .cart-thumb img{width:100%;height:100%;object-fit:cover}
  .cart-mid{flex:1;min-width:0}
  .cart-mid .n{font-family:'Fredoka',sans-serif;font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cart-mid .p{font-weight:800;font-size:13.5px;color:var(--coral)}
  .qty{display:flex;align-items:center;gap:2px;background:var(--cream);border-radius:100px;padding:3px}
  .qty button{width:26px;height:26px;border-radius:50%;background:var(--white);font-weight:800;font-size:14px;display:grid;place-items:center;box-shadow:0 2px 5px rgba(46,46,46,.1)}
  .qty span{min-width:24px;text-align:center;font-weight:800;font-size:14px}
  .totals{margin-top:16px;background:var(--white);border-radius:16px;padding:14px 16px;font-size:14.5px}
  .trow{display:flex;justify-content:space-between;padding:3px 0;color:var(--ink-soft)}
  .trow.grand{font-family:'Fredoka',sans-serif;font-weight:700;font-size:17px;color:var(--char);border-top:1px dashed var(--line);margin-top:8px;padding-top:10px}
  .freeship{font-size:12.5px;color:var(--turq);font-weight:700;margin-top:6px}

  /* FORMS */
  .field{margin-top:12px}
  .field label{display:block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:13px;margin-bottom:5px}
  .field :is(input,select,textarea){width:100%;font:inherit;font-size:15px;padding:12px 14px;border-radius:14px;border:2px solid var(--line);background:var(--white);color:var(--char);transition:border-color .2s}
  .field :is(input,select,textarea):focus{outline:none;border-color:var(--turq)}
  .field .err{border-color:var(--coral)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-err{color:var(--coral);font-weight:700;font-size:13.5px;margin-top:10px;display:none}
  .form-err.show{display:block}

  /* PAYMENT */
  .steps{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
  .stepdot{width:8px;height:8px;border-radius:50%;background:var(--line)}
  .stepdot.on{background:var(--turq);width:22px;border-radius:100px}
  .payhero{background:var(--white);border-radius:18px;padding:18px;text-align:center;margin-top:12px}
  .dn-badge{display:inline-flex;align-items:center;gap:8px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;color:var(--duitnow)}
  .dn-badge .sq{width:26px;height:26px;border-radius:7px;background:var(--duitnow);color:#fff;display:grid;place-items:center;font-size:13px}
  .qrbox{width:200px;height:200px;margin:14px auto;border-radius:16px;background:var(--cream);border:2px dashed var(--line);display:grid;place-items:center;overflow:hidden}
  .qrbox img{width:100%;height:100%;object-fit:contain}
  .qrbox .hint{font-size:12.5px;color:#B9AE9C;padding:16px}
  .paysteps{text-align:left;margin-top:10px;font-size:14px;color:var(--ink-soft)}
  .paysteps li{margin:6px 0 6px 18px}
  .payname{font-weight:800;margin-top:4px}
  .refnote{font-size:12.5px;color:#B9AE9C;margin-top:10px}

  /* SUCCESS */
  .done{text-align:center;padding:20px 0 10px}
  .done .big{font-size:56px;animation:pop .5s var(--ease)}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .done h2{padding:0;margin-top:10px}
  .done p{color:var(--ink-soft);font-size:15px;margin-top:6px}
  .orderid{display:inline-block;font-family:'Fredoka',sans-serif;font-weight:700;background:var(--white);border-radius:100px;padding:8px 18px;margin-top:12px}

  footer{border-top:1px solid var(--line);padding:34px 0 44px;text-align:center}
  .fbrand{display:inline-flex;align-items:center;gap:8px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:17px}
  footer p{color:var(--ink-soft);font-size:13.5px;margin-top:6px}
  footer .flinks{display:flex;gap:18px;justify-content:center;margin-top:14px;font-weight:800;font-size:14px}
  footer .flinks a{color:var(--turq)}

  .toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,80px);background:var(--char);color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14.5px;padding:12px 22px;border-radius:100px;z-index:80;transition:transform .35s var(--ease);box-shadow:0 12px 26px rgba(46,46,46,.3)}
  .toast.show{transform:translate(-50%,0)}

  /* ACCOUNT & VOUCHERS */
  .member-dot{position:absolute;top:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:var(--turq);border:2px solid var(--white);display:none}
  .icon-btn.logged .member-dot{display:block}
  .authtabs{display:flex;gap:8px;margin-top:10px}
  .muted{color:var(--ink-soft);font-size:13.5px;margin-top:6px}
  .acct-box{background:var(--white);border-radius:16px;padding:14px 16px;margin-top:12px;font-size:14.5px;line-height:1.5}
  .vrow{display:flex;gap:8px;margin-top:12px}
  .vrow input{flex:1;min-width:0;font:inherit;font-size:14px;padding:11px 14px;border-radius:100px;border:2px solid var(--line);background:var(--white);text-transform:uppercase}
  .vrow input:focus{outline:none;border-color:var(--turq)}
  .vrow .apply{flex:none;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;padding:0 20px;border-radius:100px;background:var(--char);color:#fff}
  .vmsg{font-size:12.5px;font-weight:700;margin-top:6px;display:none}
  .vmsg.ok{display:block;color:var(--turq)}
  .vmsg.bad{display:block;color:var(--coral)}
  .trow.disc span:last-child{color:var(--turq);font-weight:800}
  .vx{color:var(--coral);font-weight:800;font-size:12px;margin-left:4px}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<section class="hero">
  <span class="zzz z1">z</span><span class="zzz z2">z</span>
  <span class="zzz z3">z</span><span class="zzz z4">z</span>
  <h1>Tiny toys, <span class="hl">forged with joy</span></h1>
  <p>Cute 3D-printed sleepy animals & flexi fidgets — designed and printed with love in Malaysia.</p>
</section>

<div class="wrap">
  <div class="controls">
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B9AE9C" stroke-width="2.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.8-4.8"/></svg>
      <input id="q" type="search" placeholder="Search toys… try “corgi” or “flexi”" aria-label="Search products">
    </div>
    <div class="chips" id="chips"></div>
  </div>
  <main class="grid" id="grid"></main>
</div>

<footer>
  <div class="fbrand">
    <svg width="20" height="20" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 6l6 10 11-3 1 11 11 2-4 11 9 7-9 7 4 11-11 2-1 11-11-3-6 10-6-10-11 3-1-11-11-2 4-11-9-7 9-7-4-11 11-2 1-11 11 3z" fill="#27C4B2"/><circle cx="50" cy="50" r="21" fill="#FFF8EE"/></svg>
    JoySmith Studio
  </div>
  <p>Handcrafted flexi toys · 3D printed · Malaysia 🇲🇾</p>
  <div class="flinks">
    <a id="figLink" href="#" target="_blank" rel="noopener">Instagram</a>
    <a id="fspLink" href="#" target="_blank" rel="noopener">Shopee</a>
    <a id="fwaLink" href="#" target="_blank" rel="noopener">WhatsApp</a>
  </div>
</footer>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="sheet"><div class="grab"></div><div class="sheet-inner" id="sheetContent"></div></div>
</div>
<div class="toast" id="toast">Added to cart 🧸</div>

<script>
/* ---------- state (in-memory cart) ---------- */
let cart = {};                 // { productId: qty }
let checkoutInfo = null;       // saved delivery form
let orderCounter = Math.floor(Math.random()*900)+100;

const $ = id => document.getElementById(id);
const grid = $('grid'), chipsEl = $('chips'), q = $('q'),
      overlay = $('overlay'), sheetContent = $('sheetContent'),
      toast = $('toast'), cartCount = $('cartCount');

$('igLink').href = SHOP.instagram; $('figLink').href = SHOP.instagram;
$('fspLink').href = SHOP.shopee; $('fwaLink').href = `https://wa.me/${SHOP.whatsapp}`;

/* ---------- member system (Supabase) ---------- */
const sb = (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_KEY)
  ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
let session = null;   // logged-in member session (null = guest)
let profile = null;   // member's saved delivery details
let voucher = null;   // applied voucher row from the vouchers table

if(sb){
  sb.auth.onAuthStateChange((_evt, s)=>{
    session = s;
    $('acctBtn').classList.toggle('logged', !!s);
    if(s) loadProfile(); else profile = null;
  });
}else{
  $('acctBtn').style.display = 'none';
}
async function loadProfile(){
  const {data} = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
  profile = data;
}
$('acctBtn').addEventListener('click', ()=>{ if(sb) openAccount(); });

let activeCat = 'All';
const cats = ['All', ...new Set(PRODUCTS.map(p=>p.category))];
chipsEl.innerHTML = cats.map(c=>`<button class="chip ${c===activeCat?'on':''}" data-cat="${c}">${c}</button>`).join('');
chipsEl.addEventListener('click', e=>{
  const b=e.target.closest('.chip'); if(!b) return;
  activeCat=b.dataset.cat;
  chipsEl.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x.dataset.cat===activeCat));
  render();
});
q.addEventListener('input', render);

const soften = h => h+'26';
const money = n => `${SHOP.currency}${n.toFixed(2).replace(/\.00$/,'')}`;
const findP = id => PRODUCTS.find(p=>p.id===id);
const badge = s => s==='preorder' ? '<span class="badge preorder">Pre-order</span>'
              : s==='soon' ? '<span class="badge soon">Coming soon</span>' : '';

function render(){
  const term = q.value.trim().toLowerCase();
  const items = PRODUCTS.filter(p=>{
    const inCat = activeCat==='All'||p.category===activeCat;
    const hay = (p.name+' '+p.tags.join(' ')+' '+p.series).toLowerCase();
    return inCat && (!term||hay.includes(term));
  });
  if(!items.length){
    grid.innerHTML = `<div class="empty"><div class="big">😴</div><p>No toys found</p><span>Try another word — or clear the search.</span></div>`;
    return;
  }
  grid.innerHTML = items.map(p=>`
    <div class="card">
      <div class="tile" style="background:${soften(p.tint)}" data-open="${p.id}" role="button" tabindex="0" aria-label="View ${p.name}">
        ${badge(p.status)}
        ${p.image?`<img src="${p.image}" alt="${p.name}" loading="lazy">`:`<span class="ph">${p.emoji}</span>`}
      </div>
      <div class="cinfo">
        <span class="cser">${p.series}</span>
        <span class="cname" data-open="${p.id}">${p.name}</span>
        <div class="crow">
          <span class="cprice">${money(p.price)}</span>
          <button class="add-btn ${p.status==='soon'?'off':''}" data-add="${p.id}" aria-label="Add ${p.name} to cart">+</button>
        </div>
      </div>
    </div>`).join('');
}

grid.addEventListener('click', e=>{
  const add = e.target.closest('[data-add]');
  if(add){ addToCart(add.dataset.add); return; }
  const open = e.target.closest('[data-open]');
  if(open) openProduct(findP(open.dataset.open));
});
grid.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const t=e.target.closest('[data-open]'); if(t) openProduct(findP(t.dataset.open)); }
});

/* ---------- cart ops ---------- */
function cartQty(){ return Object.values(cart).reduce((a,b)=>a+b,0); }
function cartSubtotal(){ return Object.entries(cart).reduce((s,[id,n])=>s+findP(id).price*n,0); }
function shippingFor(state){
  const sub = cartSubtotal();
  if(SHOP.freeShipAbove>0 && sub>=SHOP.freeShipAbove) return 0;
  return EAST_MY.includes(state) ? SHOP.shippingEM : SHOP.shippingWM;
}
function addToCart(id, n=1){
  cart[id]=(cart[id]||0)+n;
  updateBadge(); showToast('Added to cart 🧸');
}
function updateBadge(){
  const n=cartQty();
  cartCount.textContent=n;
  cartCount.classList.toggle('show', n>0);
}
let toastTimer;
function showToast(msg){
  toast.textContent=msg; toast.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),1800);
}

/* ---------- sheets ---------- */
function openSheet(html){ sheetContent.innerHTML=html; overlay.classList.add('open'); document.body.style.overflow='hidden'; }
function closeSheet(){ overlay.classList.remove('open'); document.body.style.overflow=''; }
overlay.addEventListener('click', e=>{ if(e.target===overlay||e.target.closest('[data-close]')) closeSheet(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

/* product detail */
function openProduct(p){
  const avail = p.status!=='soon';
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <div class="stile" style="background:${soften(p.tint)}">
      ${p.image?`<img src="${p.image}" alt="${p.name}">`:`<span class="ph">${p.emoji}</span>`}
    </div>
    <div class="sser" style="margin-top:12px">${p.series}</div>
    <div class="sname">${p.name}</div>
    <div class="sprice">${money(p.price)}</div>
    <p class="sdesc">${p.desc}</p>
    <div class="cta-row">
      <button class="cta ghost ${avail?'':'off'}" data-addsheet="${p.id}">Add to cart</button>
      <button class="cta accent ${avail?'':'off'}" data-buynow="${p.id}">${avail?'Buy now':'Coming soon'}</button>
    </div>`);
}
sheetContent.addEventListener('click', e=>{
  const a=e.target.closest('[data-addsheet]');
  if(a){ addToCart(a.dataset.addsheet); closeSheet(); return; }
  const b=e.target.closest('[data-buynow]');
  if(b){ addToCart(b.dataset.buynow); openCart(); return; }
  if(e.target.closest('[data-cart-open]')){ openCart(); return; }
  if(e.target.closest('[data-checkout]')){ openCheckout(); return; }
  if(e.target.closest('[data-back-cart]')){ openCart(); return; }
  if(e.target.closest('[data-topay]')){ if(validateForm()) openPayment(); return; }
  if(e.target.closest('[data-back-info]')){ openCheckout(); return; }
  if(e.target.closest('[data-placeorder]')){ placeOrder(); return; }
  const am=e.target.closest('[data-authmode]'); if(am){ openAuth(am.dataset.authmode); return; }
  const ag=e.target.closest('[data-authgo]'); if(ag){ doAuth(ag.dataset.authgo); return; }
  if(e.target.closest('[data-signout]')){ sb.auth.signOut(); closeSheet(); showToast('Signed out 👋'); return; }
  if(e.target.closest('[data-profile-edit]')){ openProfileEdit(); return; }
  if(e.target.closest('[data-profile-save]')){ saveProfileEdit(); return; }
  if(e.target.closest('[data-acct-back]')){ openAccount(); return; }
  if(e.target.closest('[data-vapply]')){ applyVoucher(); return; }
  if(e.target.closest('[data-vremove]')){ voucher=null; openCart(); return; }
  const inc=e.target.closest('[data-inc]'); if(inc){ cart[inc.dataset.inc]++; updateBadge(); openCart(); return; }
  const dec=e.target.closest('[data-dec]');
  if(dec){ const id=dec.dataset.dec; cart[id]--; if(cart[id]<=0) delete cart[id]; updateBadge(); cartQty()?openCart():closeSheet(); return; }
});
$('cartBtn').addEventListener('click', openCart);

/* account sheet: profile if signed in, else sign-in / register */
function openAccount(){
  if(!session){ openAuth('signin'); return; }
  const u = session.user;
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <h2>My account</h2>
    <div class="acct-box">
      <b>${u.user_metadata?.name || 'Member'}</b><br>${u.email}
      ${profile ? `<div class="muted">📦 ${profile.name||''} · ${profile.phone||''}<br>${profile.addr||''}<br>${profile.post||''} ${profile.city||''}, ${profile.state||''}</div>`
                : `<div class="muted">No delivery details saved yet — add them below so checkout fills itself in. ✦</div>`}
    </div>
    <div class="cta-row">
      <button class="cta ghost" data-profile-edit>${profile ? 'Edit delivery details' : 'Add delivery details'}</button>
    </div>
    <div class="cta-row">
      <button class="cta ghost" data-signout>Sign out</button>
      <button class="cta dark" data-close>Done</button>
    </div>`);
}
/* edit delivery details from the account sheet */
function openProfileEdit(){
  const i = profile || {};
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <h2>Delivery details</h2>
    <div class="field"><label for="p-name">Full name</label><input id="p-name" autocomplete="name" value="${i.name||''}"></div>
    <div class="field"><label for="p-phone">Phone (WhatsApp)</label><input id="p-phone" inputmode="tel" autocomplete="tel" placeholder="01X-XXXXXXX" value="${i.phone||''}"></div>
    <div class="field"><label for="p-addr">Street address</label><textarea id="p-addr" rows="2" autocomplete="street-address" placeholder="Unit, street, taman…">${i.addr||''}</textarea></div>
    <div class="two">
      <div class="field"><label for="p-post">Postcode</label><input id="p-post" inputmode="numeric" autocomplete="postal-code" maxlength="5" value="${i.post||''}"></div>
      <div class="field"><label for="p-city">City</label><input id="p-city" autocomplete="address-level2" value="${i.city||''}"></div>
    </div>
    <div class="field"><label for="p-state">State</label>
      <select id="p-state">${MY_STATES.map(s=>`<option ${i.state===s?'selected':''}>${s}</option>`).join('')}</select>
    </div>
    <p class="form-err" id="pErr">Please fill in every field (postcode is 5 digits).</p>
    <div class="cta-row">
      <button class="cta ghost" data-acct-back>← Back</button>
      <button class="cta dark" data-profile-save>Save</button>
    </div>`);
}
async function saveProfileEdit(){
  const v = id => $(id).value.trim();
  const row = { name:v('p-name'), phone:v('p-phone'), addr:v('p-addr'), post:v('p-post'), city:v('p-city'), state:$('p-state').value };
  const bad = !row.name || !row.phone || !row.addr || !/^\d{5}$/.test(row.post) || !row.city;
  $('pErr').textContent = 'Please fill in every field (postcode is 5 digits).';
  $('pErr').classList.toggle('show', bad);
  if(bad) return;
  const {error} = await sb.from('profiles').upsert({ id: session.user.id, ...row, updated_at: new Date().toISOString() });
  if(error){ $('pErr').textContent = "Couldn't save — check your connection and try again."; $('pErr').classList.add('show'); return; }
  await loadProfile();
  showToast('Details saved ✅');
  openAccount();
}
function openAuth(mode){
  const reg = mode === 'register';
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <h2>${reg ? 'Join JoySmith' : 'Member sign in'}</h2>
    <p class="muted">Members get auto-filled checkout and member-only vouchers ✦</p>
    <div class="authtabs">
      <button class="chip ${reg?'':'on'}" data-authmode="signin">Sign in</button>
      <button class="chip ${reg?'on':''}" data-authmode="register">Register</button>
    </div>
    ${reg ? `<div class="field"><label for="a-name">Your name</label><input id="a-name" autocomplete="name"></div>` : ''}
    <div class="field"><label for="a-email">Email</label><input id="a-email" type="email" autocomplete="email"></div>
    <div class="field"><label for="a-pass">Password</label><input id="a-pass" type="password" autocomplete="${reg?'new-password':'current-password'}"></div>
    ${reg ? `
    <div class="field"><label for="a-phone">Phone (WhatsApp)</label><input id="a-phone" inputmode="tel" autocomplete="tel" placeholder="01X-XXXXXXX"></div>
    <div class="field"><label for="a-addr">Street address</label><textarea id="a-addr" rows="2" autocomplete="street-address" placeholder="Unit, street, taman…"></textarea></div>
    <div class="two">
      <div class="field"><label for="a-post">Postcode</label><input id="a-post" inputmode="numeric" autocomplete="postal-code" maxlength="5"></div>
      <div class="field"><label for="a-city">City</label><input id="a-city" autocomplete="address-level2"></div>
    </div>
    <div class="field"><label for="a-state">State</label>
      <select id="a-state">${MY_STATES.map(s=>`<option>${s}</option>`).join('')}</select>
    </div>` : ''}
    <p class="form-err" id="authErr"></p>
    <div class="cta-row"><button class="cta accent full" data-authgo="${mode}">${reg ? 'Create account' : 'Sign in'}</button></div>`);
}
async function doAuth(mode){
  const email = $('a-email').value.trim(), pass = $('a-pass').value;
  const err = $('authErr');
  const fail = t => { err.textContent = t; err.classList.add('show'); };
  if(!email || !pass) return fail('Please fill in email and password.');
  err.classList.remove('show');
  try{
    if(mode === 'register'){
      if(pass.length < 6) return fail('Password needs at least 6 characters.');
      const name = $('a-name').value.trim(),  phone = $('a-phone').value.trim(),
            addr = $('a-addr').value.trim(),  post  = $('a-post').value.trim(),
            city = $('a-city').value.trim(),  state = $('a-state').value;
      if(!name || !phone || !addr || !post || !city) return fail('Please fill in all your details.');
      if(!/^\d{5}$/.test(post)) return fail('Postcode should be 5 digits.');
      const {data, error} = await sb.auth.signUp({ email, password: pass, options: { data: { name } } });
      if(error) throw error;
      if(!data.session){   // project has email confirmation turned on
        openSheet(`<button class="close" data-close aria-label="Close">✕</button>
          <div class="done"><div class="big">📮</div><h2>Check your inbox</h2>
          <p>We sent a confirmation link to <b>${email}</b>.<br>Click it, then sign in here — your details will save on your first order.</p></div>`);
        return;
      }
      // save delivery details to the member's profile right away
      const {error: pErr} = await sb.from('profiles').upsert({ id: data.session.user.id, name, phone, addr, post, city, state, updated_at: new Date().toISOString() });
      await loadProfile();
      closeSheet();
      showToast(pErr ? 'Account created — add your address under My account' : 'Welcome to JoySmith! 🎉');
    }else{
      const {error} = await sb.auth.signInWithPassword({ email, password: pass });
      if(error) throw error;
      closeSheet(); showToast('Welcome back 👋');
    }
  }catch(ex){
    fail(ex.message === 'Invalid login credentials' ? 'Wrong email or password.' : (ex.message || 'Something went wrong — try again.'));
  }
}

/* vouchers */
function discountFor(sub){
  if(!voucher) return 0;
  if(sub < Number(voucher.min_spend || 0)) return 0;
  const v = Number(voucher.value);
  const d = voucher.kind === 'percent' ? sub * v / 100 : v;
  return Math.min(Math.round(d * 100) / 100, sub);
}
async function applyVoucher(){
  const input = $('vcode'), msg = $('vmsg');
  const say = (t, ok) => { msg.textContent = t; msg.className = 'vmsg ' + (ok ? 'ok' : 'bad'); };
  const code = input.value.trim().toUpperCase();
  if(!code) return say('Type a voucher code first.', false);
  const {data: v, error} = await sb.from('vouchers').select('*').eq('code', code).maybeSingle();
  if(error || !v) return say("Hmm, that code isn't valid or has expired.", false);
  if(v.members_only && !session) return say('This voucher is members-only — sign in first.', false);
  if(cartSubtotal() < Number(v.min_spend || 0)) return say(`This code needs a minimum spend of ${money(Number(v.min_spend))}.`, false);
  voucher = v;
  showToast('Voucher applied 🎟️');
  openCart();
}

/* cart view */
function openCart(){
  if(!cartQty()){
    openSheet(`<button class="close" data-close aria-label="Close">✕</button>
      <div class="done"><div class="big">🛒</div><h2>Your cart is empty</h2>
      <p>Add a sleepy friend to get started.</p></div>`);
    return;
  }
  const lines = Object.entries(cart).map(([id,n])=>{
    const p=findP(id);
    return `<div class="cart-line">
      <div class="cart-thumb" style="background:${soften(p.tint)}">${p.image?`<img src="${p.image}" alt="">`:p.emoji}</div>
      <div class="cart-mid"><div class="n">${p.name}</div><div class="p">${money(p.price)}</div></div>
      <div class="qty">
        <button data-dec="${id}" aria-label="Decrease">−</button>
        <span>${n}</span>
        <button data-inc="${id}" aria-label="Increase">+</button>
      </div>
    </div>`;
  }).join('');
  const sub=cartSubtotal(), disc=discountFor(sub);
  const freeGap = SHOP.freeShipAbove>0 ? SHOP.freeShipAbove-sub : -1;
  const vbox = !sb ? '' : voucher ? '' :
    `<div class="vrow"><input id="vcode" placeholder="Voucher code" aria-label="Voucher code"><button class="apply" data-vapply>Apply</button></div><p class="vmsg" id="vmsg"></p>`;
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <h2>Your cart</h2>
    ${lines}
    ${vbox}
    <div class="totals">
      <div class="trow"><span>Subtotal</span><span>${money(sub)}</span></div>
      ${voucher?`<div class="trow disc"><span>Voucher ${voucher.code} <button class="vx" data-vremove aria-label="Remove voucher">✕ remove</button></span><span>−${money(disc)}</span></div>`:''}
      <div class="trow"><span>Shipping</span><span>calculated at checkout</span></div>
      ${freeGap>0?`<div class="freeship">Add ${money(freeGap)} more for free shipping ✦</div>`:''}
      ${freeGap<=0&&SHOP.freeShipAbove>0?`<div class="freeship">You've unlocked free shipping 🎉</div>`:''}
    </div>
    <div class="cta-row"><button class="cta accent full" data-checkout>Checkout →</button></div>`);
}

/* checkout: delivery form */
function openCheckout(){
  const i = checkoutInfo || profile || {};   // members get saved details auto-filled
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <div class="steps"><span class="stepdot on"></span><span class="stepdot"></span><span class="stepdot"></span></div>
    <h2>Delivery details</h2>
    <div class="field"><label for="f-name">Full name</label><input id="f-name" autocomplete="name" value="${i.name||''}"></div>
    <div class="field"><label for="f-phone">Phone (WhatsApp)</label><input id="f-phone" inputmode="tel" autocomplete="tel" placeholder="01X-XXXXXXX" value="${i.phone||''}"></div>
    <div class="field"><label for="f-addr">Street address</label><textarea id="f-addr" rows="2" autocomplete="street-address" placeholder="Unit, street, taman…">${i.addr||''}</textarea></div>
    <div class="two">
      <div class="field"><label for="f-post">Postcode</label><input id="f-post" inputmode="numeric" autocomplete="postal-code" maxlength="5" value="${i.post||''}"></div>
      <div class="field"><label for="f-city">City</label><input id="f-city" autocomplete="address-level2" value="${i.city||''}"></div>
    </div>
    <div class="field"><label for="f-state">State</label>
      <select id="f-state">${MY_STATES.map(s=>`<option ${i.state===s?'selected':''}>${s}</option>`).join('')}</select>
    </div>
    <div class="field"><label for="f-note">Order note (optional)</label><input id="f-note" placeholder="Colour requests, gift note…" value="${i.note||''}"></div>
    <p class="form-err" id="formErr">Please fill in the highlighted fields.</p>
    <div class="cta-row">
      <button class="cta ghost" data-back-cart>← Cart</button>
      <button class="cta dark" data-topay>Continue →</button>
    </div>`);
}
function validateForm(){
  const get=id=>$(id);
  const req=['f-name','f-phone','f-addr','f-post','f-city'];
  let ok=true;
  req.forEach(id=>{ const el=get(id); const bad=!el.value.trim(); el.classList.toggle('err',bad); if(bad) ok=false; });
  const post=get('f-post'); if(post.value && !/^\d{5}$/.test(post.value.trim())){ post.classList.add('err'); ok=false; }
  $('formErr').classList.toggle('show',!ok);
  if(ok){
    checkoutInfo={ name:get('f-name').value.trim(), phone:get('f-phone').value.trim(),
      addr:get('f-addr').value.trim(), post:get('f-post').value.trim(),
      city:get('f-city').value.trim(), state:get('f-state').value, note:get('f-note').value.trim() };
  }
  return ok;
}

/* payment step */
function openPayment(){
  const sub=cartSubtotal(), disc=discountFor(sub), ship=shippingFor(checkoutInfo.state), total=sub-disc+ship;
  const qr = SHOP.duitnowQR
    ? `<img src="${SHOP.duitnowQR}" alt="DuitNow QR code">`
    : `<span class="hint">Your DuitNow QR appears here — add its filename to SHOP.duitnowQR at the top of this file.</span>`;
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <div class="steps"><span class="stepdot on"></span><span class="stepdot on"></span><span class="stepdot"></span></div>
    <h2>Payment</h2>
    <div class="totals">
      <div class="trow"><span>Subtotal</span><span>${money(sub)}</span></div>
      ${disc>0?`<div class="trow disc"><span>Voucher ${voucher.code}</span><span>−${money(disc)}</span></div>`:''}
      <div class="trow"><span>Shipping · ${checkoutInfo.state}</span><span>${ship===0?'FREE':money(ship)}</span></div>
      <div class="trow grand"><span>Total</span><span>${money(total)}</span></div>
    </div>
    <div class="payhero">
      <div class="dn-badge"><span class="sq">D</span> DuitNow QR</div>
      <div class="qrbox">${qr}</div>
      <div class="payname">Pay to: ${SHOP.duitnowName}</div>
      <ol class="paysteps">
        <li>Open <b>any banking app or eWallet</b> (TNG, MAE, HLB Connect…) and tap <b>Scan / Pay</b></li>
        <li>Scan the QR and pay <b>${money(total)}</b></li>
        <li>Tap <b>Place order</b> below — your order + receipt go to our WhatsApp for instant confirmation</li>
      </ol>
      <p class="refnote">Your order isn't confirmed until we verify payment — we reply fast! 💬</p>
    </div>
    <div class="cta-row">
      <button class="cta ghost" data-back-info>← Details</button>
      <button class="cta dnpay" data-placeorder>Place order</button>
    </div>`);
}

/* place order -> WhatsApp handoff + success */
function placeOrder(){
  const sub=cartSubtotal(), disc=discountFor(sub), ship=shippingFor(checkoutInfo.state), total=sub-disc+ship;
  const oid=`JS-${Date.now().toString().slice(-6)}${orderCounter++}`;
  const cartItems=Object.entries(cart).map(([id,n])=>{
    const p=findP(id); return {id, name:p.name, qty:n, price:p.price};
  });
  const items=cartItems.map(it=>`• ${it.name} ×${it.qty} — ${money(it.price*it.qty)}`).join('\n');
  const msg=
`🧸 *NEW ORDER ${oid}* — ${SHOP.name}

${items}

Subtotal: ${money(sub)}
${disc>0?`Voucher (${voucher.code}): −${money(disc)}\n`:''}Shipping (${checkoutInfo.state}): ${ship===0?'FREE':money(ship)}
*Total: ${money(total)}*

📦 *Deliver to*
${checkoutInfo.name}
${checkoutInfo.phone}
${checkoutInfo.addr}
${checkoutInfo.post} ${checkoutInfo.city}, ${checkoutInfo.state}
${checkoutInfo.note?`📝 Note: ${checkoutInfo.note}`:''}

💗 Paid via DuitNow QR — receipt attached below:`;
  window.open(`https://wa.me/${SHOP.whatsapp}?text=${encodeURIComponent(msg)}`,'_blank');
  if(sb){  // save the order (and member profile) in the background — WhatsApp handoff never waits on this
    sb.from('orders').insert({
      order_no:oid, user_id:session?.user.id||null,
      customer_name:checkoutInfo.name, phone:checkoutInfo.phone, addr:checkoutInfo.addr,
      post:checkoutInfo.post, city:checkoutInfo.city, state:checkoutInfo.state, note:checkoutInfo.note||null,
      items:cartItems, subtotal:sub, shipping:ship,
      voucher_code:voucher?.code||null, discount:disc, total
    }).then(({error})=>{ if(error) console.warn('order save failed:', error.message); });
    if(session){
      sb.from('profiles').upsert({
        id:session.user.id, name:checkoutInfo.name, phone:checkoutInfo.phone, addr:checkoutInfo.addr,
        post:checkoutInfo.post, city:checkoutInfo.city, state:checkoutInfo.state, updated_at:new Date().toISOString()
      }).then(()=>loadProfile());
    }
  }
  cart={}; voucher=null; updateBadge();
  openSheet(`
    <button class="close" data-close aria-label="Close">✕</button>
    <div class="steps"><span class="stepdot on"></span><span class="stepdot on"></span><span class="stepdot on"></span></div>
    <div class="done">
      <div class="big">🎉</div>
      <h2>Order sent!</h2>
      <p>WhatsApp just opened with your order — hit <b>send</b> and attach your payment receipt. We'll confirm right away.</p>
      <span class="orderid">Order ${oid}</span>
    </div>
    <div class="cta-row" style="margin-top:20px"><button class="cta dark full" data-close>Back to shop</button></div>`);
}

render(); updateBadge();
</script>
</body>
</html>
